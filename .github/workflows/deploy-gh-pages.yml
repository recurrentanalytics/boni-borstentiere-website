# Veröffentlicht nur die statische Site nach Branch gh-pages.
# GitHub → Settings → Pages → Source: Branch gh-pages, Ordner / (root)
name: Publish to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static bundle
        run: |
          mkdir -p _site
          cp index.html impressum.html datenschutz.html .nojekyll _site/
          cp -r img _site/
          if [ -d audio ]; then cp -r audio _site/; fi

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
